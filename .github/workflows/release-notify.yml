name: Notify Telegram on release

on:
  release:
    types: [published]
  # ручной запуск для тест/перепоста: Actions → Run workflow → ввести тег
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to post (e.g. v0.2.1). Leave blank for latest.'
        required: false
        type: string
      edit_message_id:
        description: 'Optional: edit an existing Telegram message id instead of posting new.'
        required: false
        type: string

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Post release to @KitsuneConnect
        env:
          KITSUNE_TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          if [ -z "$KITSUNE_TG_TOKEN" ]; then
            echo "::warning::TELEGRAM_BOT_TOKEN secret not set — skipping notification."
            exit 0
          fi
          ARGS=""
          if [ -n "${{ inputs.tag }}" ]; then
            ARGS="${{ inputs.tag }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            ARGS="${{ github.event.release.tag_name }}"
          fi
          # Валидация edit_message_id — только цифры, чтобы случайно скопированный
          # ярлык поля ("edit_message_id: 3") не попал как value.
          EDIT_ID="${{ inputs.edit_message_id }}"
          if [ -n "$EDIT_ID" ]; then
            if echo "$EDIT_ID" | grep -qE '^[0-9]+$'; then
              ARGS="$ARGS --edit $EDIT_ID"
            else
              echo "::error::edit_message_id must be a positive integer, got: $EDIT_ID"
              exit 1
            fi
          fi
          python scripts/notify_telegram.py $ARGS
